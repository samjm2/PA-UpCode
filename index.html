<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <title>FranchiseFit MVP</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- App Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- MAP -->
    <div id="map"></div>

    <!-- SIDE PANEL -->
    <div class="panel">

      <!-- HEADER -->
      <div class="header">
        <div class="brand">
          <h1>FranchiseFit</h1>
          <p>Fast location scoring for franchise & SMB decisions.</p>
        </div>
        <div class="pill">Live Map • MVP</div>
      </div>

      <!-- LOCATION CONTROLS -->
      <div class="card">
        <div class="controls">
          <input
            id="locationInput"
            placeholder="Enter city or address (e.g. Austin, TX)"
          />
          <input
            id="latInput"
            placeholder="Enter latitude (e.g. 30.2672)"
          />
          <input
            id="lonInput"
            placeholder="Enter longitude (e.g. -97.7431)"
          />
          <button id="getTractsBtn">Get Tracts</button>
          <select id="radius">
            <option value="3">3 mi</option>
            <option value="5" selected>5 mi</option>
            <option value="6">6 mi</option>
          </select>

          <button id="analyzeBtn">Analyze</button>
        </div>

        <p class="small">
          Search a city or address, choose a radius, and generate a location score.
        </p>
      </div>

      <!-- OVERALL SCORE -->
      <div class="card">
        <div class="scoreRow">
          <div>
            <div class="score" id="score">--</div>
            <div id="verdict" class="verdict">Enter a location</div>
          </div>
        </div>
      </div>

      <!-- FACTOR BREAKDOWN -->
      <div class="card">
        <h3>Key Factors</h3>
        <div id="factors" class="factors"></div>
        <p class="small">
          Scores are mock data for MVP demonstration purposes.
        </p>
      </div>

      <!-- ACTIONS -->
      <div class="card">
        <div class="actions">
          <button id="saveBtn">Save Location</button>
          <button id="exportBtn" class="secondary">Export CSV</button>
        </div>

        <div class="fileRow" style="margin-top:10px;">
          <input type="file" id="importInput" accept=".csv" />
        </div>
      </div>

      <!-- SAVED LOCATIONS -->
      <div class="card">
        <h3>Saved Locations</h3>
        <ul id="savedList" class="savedList"></ul>
      </div>

    </div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- App Script -->
  <script type="module" src="main.js"></script>
</body>
</html>
